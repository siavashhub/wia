name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Required for manual runs."
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version from tag
        id: resolve
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrEmpty($tag)) { $tag = "${{ github.ref_name }}" }
          $version = $tag.TrimStart('v')
          "tag=$tag"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building $tag (version=$version)"

      - name: Require curated release notes
        # Hard gate: every tagged release MUST ship with handcrafted notes
        # at docs/releases/<tag>.md. The drift test enforces the filename
        # shape; this step enforces that the file actually exists before
        # we build anything heavy. Skipped on workflow_dispatch with
        # `tag` ending in `-dryrun` so you can rehearse the pipeline
        # without writing notes first.
        shell: pwsh
        run: |
          $tag = "${{ steps.resolve.outputs.tag }}"
          $path = "docs/releases/$tag.md"
          if (Test-Path $path) {
            Write-Host "Found release notes: $path"
            exit 0
          }
          if ($tag.EndsWith("-dryrun")) {
            Write-Host "::warning::Dry-run tag $tag, skipping release-notes gate."
            exit 0
          }
          Write-Host "::error::Missing curated release notes at $path."
          Write-Host "::error::Create docs/releases/$tag.md (see the v0.2.1 / v0.3.0 templates) and re-tag."
          exit 1

      - name: Stamp version.json from tag
        # The git tag is the single source of truth for release versions.
        # Overwrite the committed version.json so the frozen exe and any
        # runtime callers of wia.__version__ report the tagged version.
        shell: pwsh
        run: |
          $path = "version.json"
          $data = Get-Content $path -Raw | ConvertFrom-Json
          $data.version = "${{ steps.resolve.outputs.version }}"
          ($data | ConvertTo-Json -Depth 10) | Set-Content -Path $path -Encoding UTF8
          Get-Content $path

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync
      - run: uv pip install pyinstaller cyclonedx-bom

      - name: Build executable
        run: uv run pyinstaller --noconfirm apps/wia-desktop/pyinstaller.spec

      - name: Smoke-test frozen executable
        # Imports the full app graph (FastAPI + MCP + jsonschema + ...) inside
        # the frozen exe and exits 0 on success. Catches missing PyInstaller
        # hidden imports / data files before we ship the installer.
        # The exe is a Windows GUI subsystem binary, so it detaches from the
        # PowerShell pipeline immediately; use Start-Process -Wait to block
        # and capture the real exit code.
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\wia-desktop\wia-desktop.exe" `
            -ArgumentList "--selfcheck" -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            throw "Frozen app failed --selfcheck (exit $($proc.ExitCode))"
          }
          Write-Host "Frozen app selfcheck passed."

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Build installer
        shell: pwsh
        run: iscc /DMyAppVersion=${{ steps.resolve.outputs.version }} installer\wia.iss

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\release | Out-Null
          Compress-Archive -Path dist\wia-desktop\* `
            -DestinationPath dist\release\wia-desktop-${{ steps.resolve.outputs.tag }}.zip
          Get-ChildItem dist\installer\*.exe | Copy-Item -Destination dist\release\

      - name: Stage release notes
        # The "Require curated release notes" gate above guarantees the
        # file exists (except for ``-dryrun`` tags), so this step just
        # copies it into the release-artifact staging dir for use as the
        # GitHub Release body.
        shell: pwsh
        run: |
          $tag = "${{ steps.resolve.outputs.tag }}"
          $src = "docs/releases/$tag.md"
          $dst = "dist/release/RELEASE_NOTES.md"
          if (Test-Path $src) {
            Copy-Item $src $dst
            Write-Host "Using release notes from $src"
          } else {
            "_No curated release notes for $tag._" | Set-Content -Path $dst -Encoding UTF8
            Write-Host "::warning::No docs/releases/$tag.md found; using placeholder body (dry-run tag)."
          }

      - name: Generate SBOM (CycloneDX)
        run: uv run cyclonedx-py environment --output-format JSON --output-file dist/release/wia-sbom.cdx.json

      - name: Generate SHA256 checksums
        shell: pwsh
        working-directory: dist/release
        run: |
          Get-ChildItem -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Set-Content -Path SHA256SUMS.txt -Encoding ASCII
          Get-Content SHA256SUMS.txt

      - name: Attest build provenance
        # Build provenance attestations require a public repo (or GitHub
        # Enterprise). Skip for private repos so the release still publishes.
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/release/*.exe
            dist/release/*.zip

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wia-release-${{ steps.resolve.outputs.tag }}
          path: dist/release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wia-release-${{ needs.build.outputs.tag }}
          path: dist/release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: WIA ${{ needs.build.outputs.tag }}
          body_path: dist/release/RELEASE_NOTES.md
          append_body: true
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            dist/release/*.exe
            dist/release/*.zip
            dist/release/SHA256SUMS.txt
            dist/release/wia-sbom.cdx.json
