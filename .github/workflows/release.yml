name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync
      - name: Install PyInstaller
        run: uv pip install pyinstaller
      - name: Build executable
        run: uv run pyinstaller apps/wia-desktop/pyinstaller.spec
      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh
      - name: Build installer
        run: iscc installer\wia.iss
        shell: pwsh
      - name: Zip portable build
        run: Compress-Archive -Path dist/wia-desktop/* -DestinationPath dist/wia-desktop-${{ github.ref_name }}.zip
        shell: pwsh
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installer/*.exe
            dist/wia-desktop-${{ github.ref_name }}.zip
