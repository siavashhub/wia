version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor:
        update-types: [minor, patch]
    labels: [dependencies, python]

  - package-ecosystem: pip
    directory: /apps/wia-desktop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor:
        update-types: [minor, patch]
    labels: [dependencies, python]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
