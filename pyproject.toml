[project]
name = "wia"
version = "0.0.0"
description = "WIA monorepo workspace root"
requires-python = ">=3.12,<3.13"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
dependencies = ["wia-desktop"]

[tool.uv.workspace]
members = ["apps/wia-desktop"]

[tool.uv.sources]
wia-desktop = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF"]
ignore = ["E501", "B008", "RUF001"]

[tool.pytest.ini_options]
testpaths = ["apps/wia-desktop/tests"]
asyncio_mode = "auto"

[dependency-groups]
dev = [
